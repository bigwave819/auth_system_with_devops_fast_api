version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db 
    environment:
      MYSQL_ROOT_PASSWORD: "12345"
      MYSQL_DATABASE: "fast_api_db"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Added user and password for a more reliable check
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p12345"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fast_api_app:
    build: .
    container_name: fastapi_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=12345
      - MYSQL_DATABASE=fast_api_db

volumes:
  mysql_data:
